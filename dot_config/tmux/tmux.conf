set -g base-index 1
set -g mouse on

# ================================
# Interface and Looks
# ================================

# Clean status bar design (Dark theme)
set -g status-style bg='#1e1e2e',fg='#cdd6f4'
set -g status-left '#[bg=#89b4fa,fg=#11111b,bold] #S '
set -g status-right '#[bg=#313244,fg=#cdd6f4] %Y-%m-%d │ %H:%M '

# Highlight the active window tab
set -g window-status-current-format '#[bg=#45475a,fg=#f5c2e7,bold] #I:#W '
set -g window-status-format '#[fg=#a6adc8] #I:#W '

# Border colors for inactive vs active panes
set -g pane-border-style fg='#313244'
set -g pane-active-border-style fg='#89b4fa'
